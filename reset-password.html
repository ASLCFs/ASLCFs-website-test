<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重置密码 - 农业SLCFs排放数据集</title>
  <link rel="stylesheet" href="styles-modern.css" />
  <script src="script.js" defer></script>
</head>
<body data-page="reset-password">
  <div class="page-shell">
    <div id="site-header-slot" class="site-shell-slot"></div>
    <div id="site-announcement-slot" class="site-shell-slot"></div>

    <main class="page-main">
      <section class="content-section">
        <div class="content-grid">
          <div class="content-card">
            <h1 id="resetPasswordTitle">重置密码</h1>
            <p class="auth-intro" id="resetPasswordText">请设置新密码。密码需包含大写字母、小写字母和数字。</p>
            <div id="authMessage" class="form-message" role="status" aria-live="polite"></div>
            <form id="resetPasswordForm" class="auth-form">
              <div class="form-group">
                <label for="newPassword" id="newPasswordLabel">新密码</label>
                <div class="password-wrapper">
                  <input type="password" id="newPassword" name="password" placeholder="请输入新密码" required autocomplete="new-password" />
                  <button type="button" class="password-toggle" aria-label="显示密码">
                    <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label for="confirmNewPassword" id="confirmNewPasswordLabel">确认新密码</label>
                <div class="password-wrapper">
                  <input type="password" id="confirmNewPassword" name="confirmPassword" placeholder="请再次输入新密码" required autocomplete="new-password" />
                  <button type="button" class="password-toggle" aria-label="显示密码">
                    <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                  </button>
                </div>
              </div>
              <button type="submit" id="resetPasswordButton">重置密码</button>
            </form>
            <p id="resetBackToLoginLink"><a href="login.html">返回登录</a></p>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer-slot" class="site-shell-slot"></div>
  </div>
</body>
</html>
